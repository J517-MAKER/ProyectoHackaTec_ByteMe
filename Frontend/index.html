<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>VigíaNE – Instituto Nacional Electoral</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,400;0,500;0,600;0,700;1,400;1,600&family=Lato:wght@300;400;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>

  <!-- LEFT PANEL -->
  <aside class="panel-left">
    <div class="logo-circle">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <rect x="3" y="3" width="18" height="18" rx="2" ry="2" fill="none" stroke="#fff" stroke-width="1.8"/>
        <polyline points="9 12 11.5 14.5 16 9.5" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <rect x="3" y="3" width="18" height="18" rx="2" fill="rgba(255,255,255,0.08)"/>
      </svg>
    </div>

    <div class="watermark-icon">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <rect x="3" y="3" width="18" height="18" rx="2"/>
      </svg>
    </div>

    <div class="quote-block">
      <blockquote>
        "La democracia se fortalece con la transparencia y la participación ciudadana."
      </blockquote>
      <p class="quote-author">Democracia y Transparencia</p>
    </div>

    <p class="footer-left">© VigíaNE 2026 &bull; Instituto Nacional Electoral</p>
  </aside>

  <!-- RIGHT PANEL -->
  <main class="panel-right">
    <div class="form-card">

      <!-- Header -->
      <div class="form-header">
        <div class="form-logo">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <rect x="3" y="3" width="18" height="18" rx="2" fill="none" stroke="#fff" stroke-width="1.8"/>
            <polyline points="9 12 11.5 14.5 16 9.5" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <div class="form-org">
          <h1>Instituto Nacional Electoral</h1>
          <span>VigíaNE</span>
        </div>
      </div>

      <!-- Mensaje de error -->
      <div id="mensajeError" class="mensaje-error" style="display:none;"></div>

      <!-- Mensaje de éxito -->
      <div id="mensajeExito" class="mensaje-exito" style="display:none;"></div>

      <!-- Formulario -->
      <form id="formularioLogin" method="POST">

        <!-- Role selector -->
        <div>
          <p class="field-label">Selecciona tu rol</p>
          <div class="role-selector">
            <button type="button" class="role-btn active" onclick="selectRole(this, 'CAEL')">CAEL</button>
            <button type="button" class="role-btn" onclick="selectRole(this, 'SEL')">SEL</button>
            <button type="button" class="role-btn" onclick="selectRole(this, 'Supervisión')">Supervisión</button>
          </div>
          <input type="hidden" id="rolSeleccionado" name="rol" value="CAEL">
        </div>

        <!-- Folio -->
        <div class="input-group">
          <p class="field-label">Folio o Clave de Elector</p>
          <div class="input-wrap">
            <span class="input-icon">
              <svg viewBox="0 0 24 24">
                <circle cx="12" cy="8" r="4"/>
                <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
              </svg>
            </span>
            <input type="text" class="input-field" id="folio" name="folio" placeholder="Ingresa tu folio" required/>
          </div>
        </div>

        <!-- Contraseña -->
        <div class="input-group">
          <p class="field-label">Contraseña</p>
          <div class="input-wrap">
            <span class="input-icon">
              <svg viewBox="0 0 24 24">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
              </svg>
            </span>
            <input type="password" class="input-field" id="passwordField" name="contrasena" placeholder="Ingresa tu contraseña" required/>
            <button type="button" class="eye-btn" onclick="togglePassword()" id="eyeBtn">
              <svg id="eyeIcon" viewBox="0 0 24 24">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </div>

        <!-- Submit -->
        <button type="submit" class="btn-submit" id="btnSubmit">Iniciar sesión</button>

      </form>

      <!-- Autofill -->
      <button type="button" class="auto-fill-link" onclick="autofill()">Autocompletar datos de prueba</button>

    </div>
  </main>

  <!-- Cookie bar -->
  <div class="cookie-bar" id="cookieBar">
    <span>Gestionar las cookies o rechazarlas</span>
    <button class="cookie-close" onclick="document.getElementById('cookieBar').remove()">✕</button>
  </div>

  <script>
    let rolActual = 'CAEL';

    function selectRole(btn, rol) {
      document.querySelectorAll('.role-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('rolSeleccionado').value = rol;
      rolActual = rol;
    }

    function togglePassword() {
      const field = document.getElementById('passwordField');
      const icon  = document.getElementById('eyeIcon');
      if (field.type === 'password') {
        field.type = 'text';
        icon.innerHTML = `
          <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
          <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
          <line x1="1" y1="1" x2="23" y2="23"/>`;
      } else {
        field.type = 'password';
        icon.innerHTML = `
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
          <circle cx="12" cy="12" r="3"/>`;
      }
    }

    function autofill() {
      // Datos de prueba según el rol seleccionado
      const datos = {
        'CAEL': { folio: 'CAEL001', contrasena: 'contraseña123' },
        'SEL': { folio: 'SEL001', contrasena: 'clave123abc' },
        'Supervisión': { folio: 'SUP001', contrasena: 'admin123' }
      };

      const dato = datos[rolActual] || datos['CAEL'];
      document.getElementById('folio').value = dato.folio;
      document.getElementById('passwordField').value = dato.contrasena;
    }

    // Manejar el envío del formulario
    document.getElementById('formularioLogin').addEventListener('submit', async function(e) {
      e.preventDefault();

      const folio = document.getElementById('folio').value.trim();
      const contrasena = document.getElementById('passwordField').value;
      const rol = document.getElementById('rolSeleccionado').value;

      // Validar campos
      if (!folio || !contrasena) {
        mostrarError('Por favor completa todos los campos');
        return;
      }

      // Mostrar loading
      const btnSubmit = document.getElementById('btnSubmit');
      btnSubmit.disabled = true;
      btnSubmit.textContent = 'Iniciando sesión...';

      try {
        const formData = new FormData();
        formData.append('folio', folio);
        formData.append('contrasena', contrasena);
        formData.append('rol', rol);

        const respuesta = await fetch('login.php', {
          method: 'POST',
          body: formData
        });

        const datos = await respuesta.json();

        if (datos.exito) {
          mostrarExito('¡Bienvenido! Redirigiendo...');
          setTimeout(() => {
            window.location.href = datos.redireccion;
          }, 1500);
        } else {
          mostrarError(datos.mensaje);
          btnSubmit.disabled = false;
          btnSubmit.textContent = 'Iniciar sesión';
        }
      } catch (error) {
        mostrarError('Error al conectar con el servidor: ' + error.message);
        btnSubmit.disabled = false;
        btnSubmit.textContent = 'Iniciar sesión';
      }
    });

    function mostrarError(mensaje) {
      const div = document.getElementById('mensajeError');
      div.textContent = '❌ ' + mensaje;
      div.style.display = 'block';
      setTimeout(() => {
        div.style.display = 'none';
      }, 5000);
    }

    function mostrarExito(mensaje) {
      const div = document.getElementById('mensajeExito');
      div.textContent = '✓ ' + mensaje;
      div.style.display = 'block';
    }
  </script>

  <style>
    .mensaje-error {
      background-color: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
      padding: 12px;
      border-radius: 4px;
      margin-bottom: 20px;
      text-align: center;
    }

    .mensaje-exito {
      background-color: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
      padding: 12px;
      border-radius: 4px;
      margin-bottom: 20px;
      text-align: center;
    }
  </style>

</body>
</html>
