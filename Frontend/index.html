<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>VigíaNE – Instituto Nacional Electoral</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,400;0,500;0,600;0,700;1,400;1,600&family=Lato:wght@300;400;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/style.css"/> <!-- Tu archivo CSS aquí -->
</head>
<body>

  <!-- LEFT PANEL -->
  <aside class="panel-left">
    <div class="logo-circle">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <rect x="3" y="3" width="18" height="18" rx="2" ry="2" fill="none" stroke="#fff" stroke-width="1.8"/>
        <polyline points="9 12 11.5 14.5 16 9.5" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <rect x="3" y="3" width="18" height="18" rx="2" fill="rgba(255,255,255,0.08)"/>
      </svg>
    </div>

    <div class="watermark-icon">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <rect x="3" y="3" width="18" height="18" rx="2"/>
      </svg>
    </div>

    <div class="quote-block">
      <blockquote>
        "La democracia se fortalece con la transparencia y la participación ciudadana."
      </blockquote>
      <p class="quote-author">Democracia y Transparencia</p>
    </div>

    <p class="footer-left">© VigíaNE 2026 &bull; Instituto Nacional Electoral</p>
  </aside>

  <!-- RIGHT PANEL -->
  <main class="panel-right">
    <div class="form-card">

      <!-- Header -->
      <div class="form-header">
        <div class="form-logo">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <rect x="3" y="3" width="18" height="18" rx="2" fill="none" stroke="#fff" stroke-width="1.8"/>
            <polyline points="9 12 11.5 14.5 16 9.5" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <div class="form-org">
          <h1>Instituto Nacional Electoral</h1>
          <span>VigíaNE</span>
        </div>
      </div>

      <!-- Role selector -->
      <div>
        <p class="field-label">Selecciona tu rol</p>
        <div class="role-selector">
          <button class="role-btn active" onclick="selectRole(this)">CAEL</button>
          <button class="role-btn" onclick="selectRole(this)">SEL</button>
          <button class="role-btn" onclick="selectRole(this)">Supervisión</button>
        </div>
      </div>

      <!-- Folio -->
      <div class="input-group">
        <p class="field-label">Folio o Clave de Elector</p>
        <div class="input-wrap">
          <span class="input-icon">
            <svg viewBox="0 0 24 24">
              <circle cx="12" cy="8" r="4"/>
              <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
            </svg>
          </span>
          <input type="text" class="input-field" placeholder="Ingresa tu folio"/>
        </div>
      </div>

      <!-- Contraseña -->
      <div class="input-group">
        <p class="field-label">Contraseña</p>
        <div class="input-wrap">
          <span class="input-icon">
            <svg viewBox="0 0 24 24">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
          </span>
          <input type="password" class="input-field" id="passwordField" placeholder="Ingresa tu contraseña"/>
          <button class="eye-btn" onclick="togglePassword()" id="eyeBtn">
            <svg id="eyeIcon" viewBox="0 0 24 24">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>

      <!-- Submit -->
      <button class="btn-submit">Iniciar sesión</button>

      <!-- Autofill -->
      <button class="auto-fill-link" onclick="autofill()">Autocompletar datos de prueba</button>

    </div>
  </main>

  <!-- Cookie bar -->
  <div class="cookie-bar" id="cookieBar">
    <span>Gestionar las cookies o rechazarlas</span>
    <button class="cookie-close" onclick="document.getElementById('cookieBar').remove()">✕</button>
  </div>

  <script>
    function selectRole(btn) {
      document.querySelectorAll('.role-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    }

    function togglePassword() {
      const field = document.getElementById('passwordField');
      const icon  = document.getElementById('eyeIcon');
      if (field.type === 'password') {
        field.type = 'text';
        icon.innerHTML = `
          <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
          <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
          <line x1="1" y1="1" x2="23" y2="23"/>`;
      } else {
        field.type = 'password';
        icon.innerHTML = `
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
          <circle cx="12" cy="12" r="3"/>`;
      }
    }

    function autofill() {
      document.querySelector('input[type="text"]').value = 'FOLIO-TEST-2026';
      document.getElementById('passwordField').value     = 'contraseña123';
    }
  </script>

</body>
</html>
