<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Funciones a Realizar por el SEL - INE</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f5f5f5 0%, #e9e9e9 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 700px;
            width: 100%;
        }

        .header {
            background: linear-gradient(135deg, #8B3A62 0%, #a84a75 100%);
            color: white;
            padding: 30px;
            border-radius: 15px 15px 0 0;
            box-shadow: 0 4px 15px rgba(139, 58, 98, 0.3);
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .header p {
            font-size: 14px;
            opacity: 0.95;
            line-height: 1.6;
        }

        .form-container {
            background: white;
            padding: 40px;
            border-radius: 0 0 15px 15px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.1);
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            font-size: 16px;
            font-weight: 600;
            color: #333;
            margin-bottom: 10px;
        }

        .form-group input[type="time"],
        .form-group input[type="number"],
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px 15px;
            font-size: 14px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            transition: all 0.3s ease;
        }

        .form-group input[type="time"]:focus,
        .form-group input[type="number"]:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #8B3A62;
            box-shadow: 0 0 0 3px rgba(139, 58, 98, 0.1);
        }

        .form-group textarea {
            min-height: 100px;
            resize: vertical;
            max-height: 200px;
        }

        .char-count {
            font-size: 12px;
            color: #999;
            margin-top: 5px;
            text-align: right;
        }

        .hidden-field {
            display: none;
            margin-top: 15px;
            padding: 15px;
            background: #fff3cd;
            border-left: 4px solid #ffc107;
            border-radius: 4px;
        }

        .hidden-field.show {
            display: block;
        }

        .hidden-field textarea {
            margin-top: 10px;
        }

        .button-group {
            display: flex;
            gap: 12px;
            margin-top: 30px;
        }

        .btn {
            flex: 1;
            padding: 14px 20px;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-submit {
            background: linear-gradient(135deg, #8B3A62 0%, #a84a75 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(139, 58, 98, 0.3);
        }

        .btn-submit:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(139, 58, 98, 0.4);
        }

        .btn-submit:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .btn-cancel {
            background: #f0f0f0;
            color: #333;
            border: 2px solid #e0e0e0;
        }

        .btn-cancel:hover {
            background: #e8e8e8;
            border-color: #d0d0d0;
        }

        .mensaje-error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            padding: 12px;
            border-radius: 4px;
            margin-bottom: 20px;
            text-align: center;
            display: none;
        }

        .mensaje-exito {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            padding: 12px;
            border-radius: 4px;
            margin-bottom: 20px;
            text-align: center;
            display: none;
        }

        .required {
            color: #8B3A62;
            font-weight: bold;
        }

        @media (max-width: 600px) {
            .button-group {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <form id="formularioSEL">
            <div class="header">
                <h1>📋 Funciones a Realizar por el SEL</h1>
                <p>Completa el siguiente formulario con la información de tu llegada y actividades en la casilla electoral.</p>
            </div>

            <div class="form-container">
                <div class="mensaje-error" id="mensajeError"></div>
                <div class="mensaje-exito" id="mensajeExito"></div>

                <div class="form-group">
                    <label for="horaLlegada">
                        ⏰ ¿A qué horas llegaste? <span class="required">*</span>
                    </label>
                    <input type="time" id="horaLlegada" name="horaLlegada" required>
                </div>

                <div class="form-group">
                    <label for="percances">
                        ⚠️ ¿Tuviste algún percance con el material dado? <span class="required">*</span>
                    </label>
                    <select id="percances" name="percances" required onchange="togglePercanceField()">
                        <option value="">-- Selecciona una opción --</option>
                        <option value="no">No, todo está bien</option>
                        <option value="si">Sí, hubo un percance</option>
                    </select>
                </div>

                <div class="hidden-field" id="percanceField">
                    <label for="descripcionPercance">
                        Describe el percance:
                    </label>
                    <textarea id="descripcionPercance" name="descripcionPercance" placeholder="Detalla qué sucedió con el material..."></textarea>
                </div>

                <div class="form-group">
                    <label for="cantidadPersonas">
                        👥 ¿Cuántas personas están presentes? <span class="required">*</span>
                    </label>
                    <input type="number" id="cantidadPersonas" name="cantidadPersonas" min="1" max="100" placeholder="Ingresa el número de personas" required>
                </div>

                <div class="form-group">
                    <label for="colaboradores">
                        👤 Ingresa los nombres de los colaboradores <span class="required">*</span>
                    </label>
                    <textarea id="colaboradores" name="colaboradores" placeholder="Escribe los nombres separados por comas o en líneas diferentes..." required></textarea>
                    <div class="char-count">
                        <span id="charCount">0</span> caracteres
                    </div>
                </div>

                <div class="button-group">
                    <button type="submit" class="btn btn-submit" id="btnSubmit">💾 Guardar Informe</button>
                    <button type="button" class="btn btn-submit" onclick="regresarInicio()">← Regresar</button>
                    <button type="reset" class="btn btn-cancel" onclick="resetForm()">✕ Cancelar</button>
                </div>
            </div>
        </form>
    </div>

    <script>
        function togglePercanceField() {
            const percances = document.getElementById('percances').value;
            const percanceField = document.getElementById('percanceField');
            
            if (percances === 'si') {
                percanceField.classList.add('show');
            } else {
                percanceField.classList.remove('show');
            }
        }

        document.getElementById('colaboradores').addEventListener('input', function() {
            document.getElementById('charCount').textContent = this.value.length;
        });

        function regresarInicio() {
            window.location.href = "SEL.html";
        }

        document.getElementById('formularioSEL').addEventListener('submit', async function(e) {
            e.preventDefault();

            const horaLlegada = document.getElementById('horaLlegada').value;
            const percances = document.getElementById('percances').value;
            const cantidadPersonas = document.getElementById('cantidadPersonas').value;
            const colaboradores = document.getElementById('colaboradores').value;

            if (!horaLlegada || !percances || !cantidadPersonas || !colaboradores) {
                mostrarError('Por favor completa todos los campos requeridos');
                return;
            }

            const btnSubmit = document.getElementById('btnSubmit');
            btnSubmit.disabled = true;
            btnSubmit.textContent = '⏳ Guardando...';

            try {
                const formData = new FormData();
                formData.append('horaLlegada', horaLlegada);
                formData.append('percances', percances);
                formData.append('descripcionPercance', document.getElementById('descripcionPercance').value);
                formData.append('cantidadPersonas', cantidadPersonas);
                formData.append('colaboradores', colaboradores);

                const respuesta = await fetch('guardar_reporte_sel.php', {
                    method: 'POST',
                    body: formData
                });

                const datos = await respuesta.json();

                if (datos.exito) {
                    mostrarExito('✓ ' + datos.mensaje);
                    
                    setTimeout(() => {
                        document.getElementById('formularioSEL').reset();
                        document.getElementById('percanceField').classList.remove('show');
                        document.getElementById('charCount').textContent = '0';
                        window.location.href = "SEL.html";
                    }, 2000);
                } else {
                    mostrarError('❌ ' + datos.mensaje);
                    btnSubmit.disabled = false;
                    btnSubmit.textContent = '💾 Guardar Informe';
                }
            } catch (error) {
                mostrarError('❌ Error: ' + error.message);
                btnSubmit.disabled = false;
                btnSubmit.textContent = '💾 Guardar Informe';
            }
        });

        function resetForm() {
            document.getElementById('formularioSEL').reset();
            document.getElementById('percanceField').classList.remove('show');
            document.getElementById('charCount').textContent = '0';
        }

        function mostrarError(mensaje) {
            const div = document.getElementById('mensajeError');
            div.textContent = mensaje;
            div.style.display = 'block';
            setTimeout(() => {
                div.style.display = 'none';
            }, 5000);
        }

        function mostrarExito(mensaje) {
            const div = document.getElementById('mensajeExito');
            div.textContent = mensaje;
            div.style.display = 'block';
        }
    </script>
</body>
</html>
