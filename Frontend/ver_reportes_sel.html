<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ver Reportes SEL - INE</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f5f5f5 0%, #e9e9e9 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            background: linear-gradient(135deg, #8B3A62 0%, #a84a75 100%);
            color: white;
            padding: 30px;
            border-radius: 15px;
            margin-bottom: 30px;
            box-shadow: 0 4px 15px rgba(139, 58, 98, 0.3);
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 14px;
            opacity: 0.95;
        }

        .btn-back {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: 2px solid white;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            margin-top: 15px;
            transition: all 0.3s ease;
        }

        .btn-back:hover {
            background: white;
            color: #8B3A62;
        }

        .mensaje-vacio {
            background: white;
            padding: 40px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        }

        .mensaje-vacio h2 {
            color: #333;
            margin-bottom: 10px;
        }

        .mensaje-vacio p {
            color: #666;
        }

        .cargando {
            text-align: center;
            padding: 40px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #8B3A62;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error {
            background: #f8d7da;
            color: #721c24;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            border: 1px solid #f5c6cb;
        }

        .reportes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .reporte-card {
            background: white;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
            transition: all 0.3s ease;
            border-top: 4px solid #8B3A62;
        }

        .reporte-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(139, 58, 98, 0.15);
        }

        .reporte-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 15px;
        }

        .reporte-titulo {
            font-size: 18px;
            font-weight: 700;
            color: #333;
            margin-bottom: 8px;
        }

        .estado-badge {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .estado-pendiente {
            background: #fff3cd;
            color: #856404;
        }

        .estado-revisado {
            background: #cfe2ff;
            color: #084298;
        }

        .estado-completado {
            background: #d1e7dd;
            color: #0f5132;
        }

        .reporte-info {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 15px;
            font-size: 14px;
        }

        .info-item {
            background: #f9f9f9;
            padding: 10px;
            border-radius: 6px;
            border-left: 3px solid #8B3A62;
        }

        .info-label {
            font-weight: 600;
            color: #666;
            font-size: 12px;
            text-transform: uppercase;
        }

        .info-valor {
            color: #333;
            font-size: 14px;
            margin-top: 5px;
        }

        .reporte-descripcion {
            background: #f0f0f0;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 15px;
            font-size: 14px;
            color: #555;
            line-height: 1.5;
            max-height: 100px;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .btn-grupo {
            display: flex;
            gap: 10px;
        }

        .btn-ver-mas {
            flex: 1;
            background: linear-gradient(135deg, #8B3A62 0%, #a84a75 100%);
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            transition: all 0.3s ease;
        }

        .btn-ver-mas:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 12px rgba(139, 58, 98, 0.3);
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal.show {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .modal-contenido {
            background: white;
            padding: 40px;
            border-radius: 15px;
            max-width: 600px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from {
                transform: translateY(30px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .modal-header {
            border-bottom: 2px solid #8B3A62;
            padding-bottom: 20px;
            margin-bottom: 20px;
        }

        .modal-header h2 {
            color: #333;
            margin-bottom: 5px;
        }

        .modal-header .fecha {
            color: #999;
            font-size: 13px;
        }

        .modal-body {
            margin-bottom: 20px;
        }

        .modal-item {
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 1px solid #eee;
        }

        .modal-item:last-child {
            border-bottom: none;
        }

        .modal-label {
            font-weight: 700;
            color: #8B3A62;
            font-size: 14px;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .modal-valor {
            color: #333;
            font-size: 15px;
            line-height: 1.6;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .modal-footer {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        .btn-cerrar {
            background: #f0f0f0;
            color: #333;
            border: 2px solid #e0e0e0;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-cerrar:hover {
            background: #e8e8e8;
        }

        .stats-section {
            background: white;
            padding: 25px;
            border-radius: 12px;
            margin-bottom: 30px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }

        .stat-item {
            background: linear-gradient(135deg, rgba(139, 58, 98, 0.05) 0%, rgba(168, 73, 118, 0.05) 100%);
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            border: 1px solid rgba(139, 58, 98, 0.1);
        }

        .stat-numero {
            font-size: 24px;
            font-weight: 700;
            color: #8B3A62;
        }

        .stat-label {
            font-size: 12px;
            color: #666;
            margin-top: 5px;
        }

        @media (max-width: 768px) {
            .reportes-grid {
                grid-template-columns: 1fr;
            }

            .reporte-info {
                grid-template-columns: 1fr;
            }

            .modal-contenido {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 Mis Reportes</h1>
            <p>Visualiza todos los reportes que has realizado</p>
            <button class="btn-back" onclick="regresarAlDashboard()">← Regresar al Dashboard</button>
        </div>

        <div id="contenidoPrincipal">
            <div class="cargando">
                <div class="spinner"></div>
                <p>Cargando tus reportes...</p>
            </div>
        </div>
    </div>

    <!-- Modal para ver detalles -->
    <div id="modalReporte" class="modal">
        <div class="modal-contenido">
            <div class="modal-header">
                <h2>Detalles del Reporte</h2>
                <div class="fecha" id="modalFecha"></div>
            </div>
            <div class="modal-body" id="modalBody"></div>
            <div class="modal-footer">
                <button class="btn-cerrar" onclick="cerrarModal()">Cerrar</button>
            </div>
        </div>
    </div>

    <script>
        function regresarAlDashboard() {
            window.location.href = "SEL.html";
        }

        function cerrarModal() {
            document.getElementById('modalReporte').classList.remove('show');
        }

        function abrirModal(reporte) {
            const modal = document.getElementById('modalReporte');
            const modalBody = document.getElementById('modalBody');
            const modalFecha = document.getElementById('modalFecha');

            // Formatear fecha
            const fecha = new Date(reporte.fecha_reporte);
            const fechaFormato = fecha.toLocaleDateString('es-ES', { 
                year: 'numeric', 
                month: 'long', 
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });
            modalFecha.textContent = fechaFormato;

            // Construir contenido
            const percanceDesc = reporte.descripcion_percance || 'No se reportó descripción';
            const colaboradoresList = reporte.nombres_colaboradores.split(',').map(c => `• ${c.trim()}`).join('\n');

            modalBody.innerHTML = `
                <div class="modal-item">
                    <div class="modal-label">Hora de Llegada</div>
                    <div class="modal-valor">🕐 ${reporte.hora_llegada}</div>
                </div>

                <div class="modal-item">
                    <div class="modal-label">Percance con Material</div>
                    <div class="modal-valor">
                        ${reporte.percance_material === 'si' ? '⚠️ Sí, hubo un percance' : '✓ No hubo percances'}
                    </div>
                </div>

                ${reporte.percance_material === 'si' ? `
                    <div class="modal-item">
                        <div class="modal-label">Descripción del Percance</div>
                        <div class="modal-valor">${percanceDesc}</div>
                    </div>
                ` : ''}

                <div class="modal-item">
                    <div class="modal-label">Cantidad de Personas Presentes</div>
                    <div class="modal-valor">👥 ${reporte.cantidad_personas} personas</div>
                </div>

                <div class="modal-item">
                    <div class="modal-label">Colaboradores</div>
                    <div class="modal-valor">${colaboradoresList}</div>
                </div>

                <div class="modal-item">
                    <div class="modal-label">Estado</div>
                    <div class="modal-valor">
                        ${reporte.estado === 'pendiente' ? '⏳ Pendiente de revisión' : 
                          reporte.estado === 'revisado' ? '👀 Revisado' : '✓ Completado'}
                    </div>
                </div>
            `;

            modal.classList.add('show');
        }

        // Cerrar modal al hacer clic fuera
        document.getElementById('modalReporte').addEventListener('click', function(e) {
            if (e.target === this) {
                cerrarModal();
            }
        });

        // Cargar reportes
        async function cargarReportes() {
            try {
                const respuesta = await fetch('obtener_reportes_sel.php');
                const datos = await respuesta.json();

                if (datos.exito) {
                    mostrarReportes(datos.reportes);
                } else {
                    mostrarError(datos.mensaje);
                }
            } catch (error) {
                mostrarError('Error al cargar los reportes: ' + error.message);
            }
        }

        function mostrarReportes(reportes) {
            const contenido = document.getElementById('contenidoPrincipal');

            if (reportes.length === 0) {
                contenido.innerHTML = `
                    <div class="mensaje-vacio">
                        <h2>📭 No hay reportes</h2>
                        <p>Aún no has creado ningún reporte. ¡Crea tu primer reporte ahora!</p>
                        <button class="btn-back" style="margin-top: 20px; background: linear-gradient(135deg, #8B3A62 0%, #a84a75 100%); color: white; border: none;" onclick="window.location.href='form-sel.html'">
                            ➕ Crear Nuevo Reporte
                        </button>
                    </div>
                `;
                return;
            }

            // Estadísticas
            const totalReportes = reportes.length;
            const reportesPendientes = reportes.filter(r => r.estado === 'pendiente').length;
            const reportesCompletados = reportes.filter(r => r.estado === 'completado').length;

            let html = `
                <div class="stats-section">
                    <h3>📈 Estadísticas de Reportes</h3>
                    <div class="stats-grid">
                        <div class="stat-item">
                            <div class="stat-numero">${totalReportes}</div>
                            <div class="stat-label">Total de Reportes</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-numero">${reportesPendientes}</div>
                            <div class="stat-label">Pendientes</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-numero">${reportesCompletados}</div>
                            <div class="stat-label">Completados</div>
                        </div>
                    </div>
                </div>

                <div class="reportes-grid">
            `;

            reportes.forEach(reporte => {
                const fecha = new Date(reporte.fecha_reporte);
                const fechaFormato = fecha.toLocaleDateString('es-ES');
                const horaFormato = fecha.toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' });

                let estadoClass = 'estado-pendiente';
                if (reporte.estado === 'revisado') estadoClass = 'estado-revisado';
                if (reporte.estado === 'completado') estadoClass = 'estado-completado';

                const percanceIcono = reporte.percance_material === 'si' ? '⚠️' : '✓';

                html += `
                    <div class="reporte-card">
                        <div class="reporte-header">
                            <div class="reporte-titulo">${fechaFormato}</div>
                            <div class="estado-badge ${estadoClass}">${reporte.estado}</div>
                        </div>

                        <div class="reporte-info">
                            <div class="info-item">
                                <div class="info-label">⏰ Hora de Llegada</div>
                                <div class="info-valor">${reporte.hora_llegada}</div>
                            </div>
                            <div class="info-item">
                                <div class="info-label">👥 Personas</div>
                                <div class="info-valor">${reporte.cantidad_personas}</div>
                            </div>
                        </div>

                        <div class="reporte-info">
                            <div class="info-item">
                                <div class="info-label">⚠️ Percances</div>
                                <div class="info-valor">${percanceIcono} ${reporte.percance_material === 'si' ? 'Sí' : 'No'}</div>
                            </div>
                            <div class="info-item">
                                <div class="info-label">📅 Fecha</div>
                                <div class="info-valor">${horaFormato}</div>
                            </div>
                        </div>

                        ${reporte.descripcion_percance ? `
                            <div class="reporte-descripcion">
                                <strong>Nota:</strong> ${reporte.descripcion_percance}
                            </div>
                        ` : ''}

                        <div class="btn-grupo">
                            <button class="btn-ver-mas" onclick='abrirModal(${JSON.stringify(reporte)})'>
                                👁️ Ver Más
                            </button>
                        </div>
                    </div>
                `;
            });

            html += `</div>`;
            contenido.innerHTML = html;
        }

        function mostrarError(mensaje) {
            const contenido = document.getElementById('contenidoPrincipal');
            contenido.innerHTML = `
                <div class="error">
                    <strong>Error:</strong> ${mensaje}
                </div>
            `;
        }

        // Cargar reportes al iniciar
        cargarReportes();
    </script>
</body>
</html>
